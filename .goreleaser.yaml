version: 2
before:
  hooks:
    - go mod tidy
builds:
  - env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=jsonv2
    goos:
      - linux
      - windows
      - darwin
      - freebsd
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/floating-cat/heteroglossia/util/cli.Version={{.Version}}
archives:
  - files:
      - none*
checksum:
  name_template: 'sha256sums.txt'
snapshot:
  version_template: "{{ incminor .Version }}-SNAPSHOT-{{.ShortCommit}}"
